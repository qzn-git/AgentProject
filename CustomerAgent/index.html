<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>民宿AI智能管家</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>民宿AI智能管家</h1>
            <p>7×24小时在线服务</p>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="message-content">
                    <p>亲，欢迎入住～🏠</p>
                    <p>我是您的专属智能管家，有什么可以帮助您的吗？</p>
                    <p>为了更好地为您服务，请提供您的房号或订单信息（手机尾号/订单号）</p>
                </div>
            </div>
        </div>
        <div class="quick-questions" id="quickQuestions">
            <div class="quick-question" data-question="入住指引">入住指引</div>
            <div class="quick-question" data-question="Wi-Fi密码">Wi-Fi密码</div>
            <div class="quick-question" data-question="周边推荐">周边推荐</div>
            <div class="quick-question" data-question="退房流程">退房流程</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="请输入您的问题..." autocomplete="off">
            <button id="sendButton">发送</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
